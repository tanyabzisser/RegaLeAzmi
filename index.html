<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6E8E75" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/jpeg" sizes="192x192" href="./icon-192.jpg" />
    <title>רגע לעצמי</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Register relative to the base URL of the app, stripping file names if any
          let pathname = window.location.pathname;
          if (pathname.includes('.')) {
            const lastSlash = pathname.lastIndexOf('/');
            pathname = lastSlash > 0 ? pathname.substring(0, lastSlash + 1) : '/';
          }
          if (!pathname.endsWith('/')) {
            pathname = pathname + '/';
          }
          const swUrl = pathname + 'sw.js';
          navigator.serviceWorker.register(swUrl)
            .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
            .catch((err) => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
