<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6E8E75" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/jpeg" sizes="192x192" href="./icon-192.jpg" />
    <title>רגע לעצמי</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clean up any registered service workers and delete caches to prevent any future caching traps or media playback issues.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Successfully unregistered active service worker.');
          }
        });
      }
      if (window.caches) {
        caches.keys().then(names => {
          for (let name of names) {
            caches.delete(name);
            console.log('Successfully deleted cache:', name);
          }
        });
      }
    </script>
  </body>
</html>
